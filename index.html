<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Contacto</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4F46E5;
            --primary-hover: #4338CA;
            --bg-color: #F3F4F6;
            --form-bg: #FFFFFF;
            --text-color: #1F2937;
            --border-color: #D1D5DB;
            --error-color: #EF4444;
            --success-color: #10B981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .form-container {
            background-color: var(--form-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 500px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-title {
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 24px;
            color: var(--text-color);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        .status-message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            display: none;
            font-weight: 500;
        }

        .status-message.success {
            display: block;
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--success-color);
        }

        .status-message.error {
            display: block;
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--error-color);
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-content {
            display: inline-block;
        }

        button.loading .btn-content {
            display: none;
        }

        button.loading .loading-spinner {
            display: block;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2 class="form-title">Contáctanos</h2>
        <form id="google-sheet-form">
            <div class="form-group">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" required placeholder="Tu nombre">
            </div>
            
            <div class="form-group">
                <label for="apellido">Apellido</label>
                <input type="text" id="apellido" name="apellido" required placeholder="Tu apellido">
            </div>

            <div class="form-group">
                <label for="correo">Correo Electrónico</label>
                <input type="email" id="correo" name="correo" required placeholder="ejemplo@correo.com">
            </div>

            <div class="form-group">
                <label for="celular">Celular</label>
                <input type="tel" id="celular" name="celular" required placeholder="+1234567890">
            </div>

            <button type="submit" id="submit-btn">
                <span class="btn-content">Enviar Información</span>
                <div class="loading-spinner"></div>
            </button>

            <div id="status-msg" class="status-message"></div>
        </form>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbw2WZjgt2vAuWqTTd_YbmyJrFpGkAmGKe2zt3mMNHEnZ5DgT225Ww6IR9NnhPxfQANI/exec';
        const form = document.getElementById('google-sheet-form');
        const btn = document.getElementById('submit-btn');
        const statusMsg = document.getElementById('status-msg');

        form.addEventListener('submit', e => {
            e.preventDefault();
            
            // Mostrar estado de carga
            btn.classList.add('loading');
            btn.disabled = true;
            statusMsg.className = 'status-message';
            
            fetch(scriptURL, { 
                method: 'POST', 
                body: new FormData(form)
            })
            .then(response => response.json())
            .then(data => {
                btn.classList.remove('loading');
                btn.disabled = false;
                
                if(data.result === 'success') {
                    statusMsg.textContent = '¡Información enviada exitosamente!';
                    statusMsg.className = 'status-message success';
                    form.reset(); // Limpia el formulario
                } else {
                    throw new Error('Error en la respuesta');
                }
            })
            .catch(error => {
                btn.classList.remove('loading');
                btn.disabled = false;
                statusMsg.textContent = 'Hubo un error al enviar. Por favor intenta de nuevo.';
                statusMsg.className = 'status-message error';
                console.error('Error!', error.message);
            });
        });
    </script>
</body>
</html>
